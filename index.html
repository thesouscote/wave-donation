<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faire un don à thesouscote</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--acc:#0a84ff;--acc2:#34aadc;--bg:#f0f4f8;--card:#ffffff;--bor:rgba(10,132,255,0.13);--txt:#0d0d0d;--mut:rgba(13,13,13,0.42);--fnt:rgba(13,13,13,0.18);--ibg:rgba(10,132,255,0.05);--shd:0 8px 48px rgba(10,132,255,0.09)}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:32px 16px 64px}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(10,132,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(10,132,255,0.03) 1px,transparent 1px);background-size:44px 44px;pointer-events:none;animation:gm 28s linear infinite}
@keyframes gm{to{background-position:0 44px}}
.page{position:relative;z-index:1;width:100%;max-width:420px;display:flex;flex-direction:column;gap:14px}
.card{background:var(--card);border:1px solid var(--bor);border-radius:28px;padding:30px 22px 26px;box-shadow:var(--shd)}
.lbl{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--mut);text-align:center;margin-bottom:5px}
.sname{font-size:30px;font-weight:800;letter-spacing:-.03em;text-align:center;color:var(--acc);margin-bottom:22px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.ba{position:relative;overflow:hidden;padding:16px 10px;border:1.5px solid var(--bor);border-radius:14px;background:var(--ibg);font-family:inherit;cursor:pointer;transition:border-color .18s,transform .15s,box-shadow .18s;text-align:center}
.ba::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--acc2),var(--acc));opacity:0;transition:opacity .18s}
.ba:hover::before,.ba.sel::before{opacity:1}
.ba:hover,.ba.sel{border-color:var(--acc);transform:translateY(-2px);box-shadow:0 6px 18px rgba(10,132,255,.2)}
.ba:active{transform:translateY(0)}
.bav{display:block;position:relative;z-index:1;font-size:20px;font-weight:800;letter-spacing:-.02em;color:var(--txt);transition:color .18s}
.bac{display:block;position:relative;z-index:1;font-size:9px;font-weight:600;letter-spacing:.07em;margin-top:3px;color:var(--mut);transition:color .18s}
.ba:hover .bav,.ba.sel .bav,.ba:hover .bac,.ba.sel .bac{color:#fff}
.ba.sel .bac{color:rgba(255,255,255,.65)}
.bc{grid-column:span 2;padding:16px 10px;border:1.5px dashed rgba(10,132,255,.25);border-radius:14px;background:var(--ibg);font-family:inherit;cursor:pointer;transition:border-color .18s,transform .15s;text-align:center;font-size:14px;font-weight:500;color:var(--mut)}
.bc:hover{border-color:var(--acc);color:var(--acc);transform:translateY(-2px)}
.cm{display:none;flex-direction:column;align-items:center;padding:16px 0 8px;margin-bottom:8px}
.cm.show{display:flex;animation:fup .25s ease both}
@keyframes fup{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.bn{font-size:clamp(28px,12vw,80px);font-weight:800;letter-spacing:-.04em;line-height:1;color:var(--txt);width:100%;text-align:center;word-break:break-all;transition:color .15s}
.bn.emp{color:var(--fnt);font-size:clamp(24px,10vw,64px);line-height:1.2}
.bf{font-size:14px;font-weight:600;color:var(--mut);margin-top:14px;letter-spacing:.06em}
.ciw{position:relative;width:100%}
.ci{width:100%;background:var(--ibg);border:1.5px solid var(--bor);border-radius:14px;padding:13px 44px 13px 16px;color:var(--txt);font-family:inherit;font-size:15px;font-weight:500;outline:none;transition:border-color .2s;-moz-appearance:textfield}
.ci::-webkit-outer-spin-button,.ci::-webkit-inner-spin-button{-webkit-appearance:none}
.ci::placeholder{color:var(--fnt);font-size:13px;font-weight:400}
.ci:focus{border-color:rgba(10,132,255,.3)}
.cbk{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:rgba(10,132,255,.08);border:none;border-radius:50%;width:26px;height:26px;font-size:11px;color:var(--acc);cursor:pointer;display:flex;align-items:center;justify-content:center}
.ex{overflow:hidden;max-height:0;opacity:0;transition:max-height .38s cubic-bezier(.4,0,.2,1),opacity .3s ease,margin-bottom .3s ease;margin-bottom:0}
.ex.show{max-height:400px;opacity:1;margin-bottom:8px}
.fr{margin-bottom:8px}
.fr:last-child{margin-bottom:0}
.fr input,.fr textarea{width:100%;background:var(--ibg);border:1.5px solid var(--bor);border-radius:14px;padding:13px 16px;color:var(--txt);font-family:inherit;font-size:14px;font-weight:400;outline:none;transition:border-color .2s;resize:none}
.fr textarea{height:44px;line-height:1.5;overflow:hidden}
.fr input::placeholder,.fr textarea::placeholder{color:var(--fnt);font-size:13px}
.fr input:focus,.fr textarea:focus{border-color:rgba(10,132,255,.3)}
.bp{width:100%;padding:16px;border:none;border-radius:99px;background:linear-gradient(135deg,var(--acc2),var(--acc));color:#fff;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:-.01em;box-shadow:0 4px 20px rgba(10,132,255,.24);position:relative;overflow:hidden}
.bp:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(10,132,255,.32)}
.bp:active{transform:translateY(0)}
.al{font-size:12px;font-weight:500;opacity:.7;margin-left:4px}
.wl{display:flex;align-items:center;justify-content:center;margin-top:12px;font-size:10px;font-weight:500;color:var(--fnt);letter-spacing:.04em}
.rip{position:absolute;border-radius:50%;background:rgba(255,255,255,.3);transform:scale(0);animation:ri .5s linear;pointer-events:none;z-index:2}
@keyframes ri{to{transform:scale(4);opacity:0}}
.ov{position:fixed;inset:0;background:rgba(240,244,248,.92);backdrop-filter:blur(16px);z-index:300;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .4s ease}
.ov.show{opacity:1;pointer-events:all}
.tb{text-align:center;padding:20px;transform:translateY(24px);transition:transform .45s cubic-bezier(.34,1.56,.64,1)}
.ov.show .tb{transform:translateY(0)}
.te{font-size:72px;display:block;margin-bottom:14px;animation:bi .6s cubic-bezier(.34,1.56,.64,1) .1s both}
@keyframes bi{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.tt{font-size:34px;font-weight:800;letter-spacing:-.03em;color:var(--txt);margin-bottom:8px}
.tt em{color:var(--acc);font-style:normal}
.ts{font-size:15px;font-weight:500;color:var(--mut);line-height:1.65;max-width:290px;margin:0 auto}
.td{display:flex;justify-content:center;gap:7px;margin-top:24px}
.td span{width:7px;height:7px;border-radius:50%;background:var(--acc);opacity:.25;animation:dp 1.2s ease-in-out infinite}
.td span:nth-child(2){animation-delay:.2s}.td span:nth-child(3){animation-delay:.4s}
@keyframes dp{0%,100%{opacity:.25}50%{opacity:1}}
@keyframes sk{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
</style>
</head>
<body>
<div class="page">
  <div class="card">
    <div class="lbl">Faire un don à</div>
    <div class="sname">thesouscote</div>
    <div class="grid" id="grid">
      <button class="ba" onclick="selAmt(500,this)"><span class="bav">500</span><span class="bac">FCFA</span></button>
      <button class="ba" onclick="selAmt(1000,this)"><span class="bav">1 000</span><span class="bac">FCFA</span></button>
      <button class="ba" onclick="selAmt(2000,this)"><span class="bav">2 000</span><span class="bac">FCFA</span></button>
      <button class="ba" onclick="selAmt(5000,this)"><span class="bav">5 000</span><span class="bac">FCFA</span></button>
      <button class="bc" onclick="openCus()">Autre montant</button>
    </div>
    <div class="cm" id="cm">
      <div style="display:flex;align-items:flex-start;justify-content:center;gap:6px;margin-bottom:14px">
        <span class="bn emp" id="bn">—</span>
        <span class="bf">FCFA</span>
      </div>
      <div class="ciw">
        <input class="ci" type="number" id="cv" inputmode="numeric" placeholder="Tape un montant…" min="1" oninput="onCusIn(this)" autocomplete="off">
        <button class="cbk" onclick="closeCus()">✕</button>
      </div>
    </div>
    <div class="ex" id="ex">
      <div class="fr"><input type="text" id="dn" placeholder="Ton pseudo (vide = Anonyme)" maxlength="40" autocomplete="off"></div>
      <div class="fr"><textarea id="dm" placeholder="Laisse un message (optionnel)…" maxlength="120" oninput="this.style.height='44px';this.style.height=this.scrollHeight+'px'"></textarea></div>
    </div>
    <button class="bp" onclick="doPay(this)">Payer via Wave<span class="al" id="al"></span></button>
    <div class="wl">Paiement sécurisé via Wave CI</div>
  </div>
</div>
<div class="ov" id="ov">
  <div class="tb">
    <span class="te">🙏</span>
    <div class="tt">Merci <em id="tname"></em>!</div>
    <p class="ts" id="tsub"></p>
    <div class="td"><span></span><span></span><span></span></div>
  </div>
</div>
<script type="module">
import { db } from "./firebase-config.js";
import { ref, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const WAVE = "https://pay.wave.com/m/M_0HDs6VQohDa2/c/ci/";

let sel = null;
window.selAmt = (a, btn) => {
  if(btn.classList.contains("sel")){ btn.classList.remove("sel"); sel=null; document.getElementById("ex").classList.remove("show"); upd(); return; }
  closeCus(false); sel=a;
  document.querySelectorAll(".ba").forEach(b=>b.classList.remove("sel"));
  btn.classList.add("sel"); document.getElementById("ex").classList.add("show"); upd();
};

window.openCus = () => {
  document.querySelectorAll(".ba").forEach(b=>b.classList.remove("sel")); sel=null;
  document.getElementById("grid").style.display="none"; document.getElementById("cm").classList.add("show");
  document.getElementById("ex").classList.remove("show"); upd();
  setTimeout(()=>document.getElementById("cv").focus(),80);
};

window.closeCus = (r) => {
  if(r===undefined) r=true;
  document.getElementById("cm").classList.remove("show"); document.getElementById("cv").value="";
  document.getElementById("grid").style.display=""; document.getElementById("bn").textContent="—";
  document.getElementById("bn").className="bn emp"; sel=null;
  if(r) document.getElementById("ex").classList.remove("show"); upd();
};

window.onCusIn = (inp) => {
  const v=parseInt(inp.value)||null; sel=v;
  const el=document.getElementById("bn");
  el.textContent=v?v.toLocaleString("fr"):"—"; el.className=v?"bn":"bn emp";
  if(inp.value.trim()) document.getElementById("ex").classList.add("show"); upd();
};

function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function upd(){ document.getElementById("al").textContent = sel ? " — "+sel.toLocaleString("fr")+" FCFA" : ""; }

window.doPay = async (btn) => {
  if(!sel||sel<1){ btn.style.animation="sk .4s ease"; setTimeout(()=>btn.style.animation="",400); return; }
  const rp=document.createElement("span"); rp.className="rip";
  const s=Math.max(btn.offsetWidth,btn.offsetHeight);
  rp.style.cssText="width:"+s+"px;height:"+s+"px;left:50%;top:50%;margin-left:"+-s/2+"px;margin-top:"+-s/2+"px;position:absolute";
  btn.appendChild(rp); setTimeout(()=>rp.remove(),600);
  
  const nom = document.getElementById("dn").value.trim()||"Anonyme";
  const msg = document.getElementById("dm").value.trim();
  
  try {
    const queueRef = ref(db, "queue");
    await push(queueRef, {
      nom,
      montant: sel,
      message: msg,
      confirmed: false,
      ts: Date.now()
    });
  } catch (e) {
    console.error("Erreur Firebase:", e);
  }
  
  let url = WAVE+"?amount="+sel+"&note="+encodeURIComponent(msg?"Don de "+nom+" : "+msg:"Don de "+nom);
  document.getElementById("tname").textContent = nom!=="Anonyme"?nom:"";
  document.getElementById("tsub").innerHTML = msg?"&ldquo;"+esc(msg)+"&rdquo;<br><br>Tu vas être redirigé vers Wave…":"Ton don compte énormément.<br>Tu vas être redirigé vers Wave…";
  document.getElementById("ov").classList.add("show");
  window.location.href = url;
};
</script>
</body>
</html>
