<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>OBS Alert</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:transparent;font-family:'Plus Jakarta Sans',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.alert{text-align:center;opacity:0;display:flex;flex-direction:column;align-items:center;gap:14px}
.aimg{width:120px;height:120px;border-radius:20px;object-fit:cover;display:none;box-shadow:0 8px 32px rgba(0,0,0,.6);border:2px solid rgba(255,255,255,.15);animation:ip .5s cubic-bezier(.34,1.56,.64,1) both}
.aimg.show{display:block}
@keyframes ip{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
.atxt{text-align:center}
.ml{font-size:26px;font-weight:500;color:#fff;line-height:1.4;text-shadow:0 2px 16px rgba(0,0,0,.6)}
.hl{font-weight:800;color:#0a84ff}
.msg{margin-top:10px;font-size:17px;font-weight:400;color:rgba(255,255,255,.82);font-style:italic;text-shadow:0 2px 12px rgba(0,0,0,.5)}
@keyframes en{from{opacity:0;transform:translateY(20px) scale(.96);filter:blur(4px)}to{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}}
@keyframes so{from{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}to{opacity:0;transform:translateY(-14px) scale(.96);filter:blur(4px)}}
</style>
</head>
<body>
<div class="alert" id="alert">
  <img class="aimg" id="aimg" src="" alt="">
  <div class="atxt">
    <div class="ml" id="ml"></div>
    <div class="msg" id="msg"></div>
  </div>
</div>
<script type="module">
import { db } from "./firebase-config.js";
import { ref, onValue, remove, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const alertEl = document.getElementById("alert");
const mlEl    = document.getElementById("ml");
const msgEl   = document.getElementById("msg");
const imgEl   = document.getElementById("aimg");

let showing   = false;
let queue     = [];
let shownKeys = new Set();

async function loadImg(){
  try {
    const s = await get(ref(db, "extras"));
    const d = s.val();
    if(d && d.alertImgActif && d.alertImg){ 
      imgEl.src = d.alertImg; 
      imgEl.classList.add("show"); 
    } else { 
      imgEl.classList.remove("show"); 
      imgEl.src = ""; 
    }
  } catch(e) {}
}

async function showNext() {
  if (showing || queue.length === 0) return;
  
  showing = true;
  const { key, don } = queue.shift();
  shownKeys.add(key);
  
  await loadImg();
  
  // Marquer comme traité (on le retire du queue car on l'affiche)
  try { await remove(ref(db, "queue/" + key)); } catch(e) {}
  
  mlEl.innerHTML = '<span class="hl">' + don.nom + '</span> a donné <span class="hl">' + Number(don.montant).toLocaleString("fr") + ' FCFA</span>';
  const hm = don.message && don.message.trim();
  msgEl.style.display = hm ? "" : "none";
  if (hm) msgEl.textContent = "« " + don.message.trim() + " »";
  
  alertEl.style.animation = "none"; 
  alertEl.style.opacity = "0";
  void alertEl.offsetWidth;
  alertEl.style.animation = "en .55s cubic-bezier(.34,1.56,.64,1) forwards";
  
  setTimeout(() => {
    alertEl.style.animation = "so .5s ease forwards";
    setTimeout(() => { 
      alertEl.style.animation = ""; 
      alertEl.style.opacity = "0"; 
      showing = false; 
      showNext(); // Afficher le suivant s'il y en a
    }, 500);
  }, 8000);
}

// Écouter les dons confirmés en temps réel
onValue(ref(db, "queue"), (snapshot) => {
  const data = snapshot.val();
  if (!data) return;
  
  Object.entries(data).forEach(([key, don]) => {
    if (don.confirmed === true && !shownKeys.has(key)) {
      // Vérifier si déjà dans la queue locale
      if (!queue.find(q => q.key === key)) {
        queue.push({ key, don });
      }
    }
  });
  
  if (!showing) showNext();
});

</script>
</body>
</html>
