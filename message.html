<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>OBS Message</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:transparent;font-family:'Plus Jakarta Sans',sans-serif;display:flex;align-items:flex-end;justify-content:center;min-height:100vh;padding:24px}
.w{display:inline-flex;align-items:center;gap:10px;background:rgba(10,10,18,.75);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.08);border-radius:99px;padding:10px 18px;animation:ap .5s cubic-bezier(.34,1.2,.64,1) forwards;max-width:600px}
@keyframes ap{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.dot{width:7px;height:7px;border-radius:50%;background:#0a84ff;box-shadow:0 0 8px #0a84ff;animation:bl 2s ease-in-out infinite;flex-shrink:0}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.3}}
.txt{font-size:14px;font-weight:600;color:rgba(255,255,255,.9);text-shadow:0 1px 8px rgba(0,0,0,.8);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:520px}
</style>
</head>
<body>
<div class="w" id="w" style="display:none">
  <div class="dot"></div>
  <div class="txt" id="txt"></div>
</div>
<script type="module">
import { db } from "./firebase-config.js";
import { ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// Écouter le message personnalisé
onValue(ref(db, "extras"), (snapshot) => {
  const data = snapshot.val();
  const msg = (data && data.obsMsg) ? data.obsMsg.trim() : "";
  const w = document.getElementById("w");
  
  if(msg){
    document.getElementById("txt").textContent = msg;
    w.style.display = "inline-flex";
  } else {
    w.style.display = "none";
  }
});
</script>
</body>
</html>
